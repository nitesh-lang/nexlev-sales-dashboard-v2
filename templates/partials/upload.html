<div class="card sec">
    <div class="card-hd"><span class="ic">🔑</span> Admin Upload – Log Daily Sales</div>
    <div class="card-sub">Upload sales files for a specific date. Restricted to admins only.</div>

    <form method="post" action="/log-sales" enctype="multipart/form-data">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
            <div>
                <label class="field-label">Admin Upload Key</label>
                <input type="password" name="upload_key" required placeholder="Enter admin key" />
            </div>
            <div>
                <label class="field-label">Sales Date</label>
                <input type="date" name="sales_date" required />
            </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
            <div>
                <label class="field-label">Nexlev – Seller Central</label>
                <input type="file" name="aa_file" accept=".xlsx,.xls" />
            </div>
            <div>
                <label class="field-label">Cambium Retail – Seller Central</label>
                <input type="file" name="cr_file" accept=".xlsx,.xls" />
            </div>
            <div>
                <label class="field-label">Viomi by Cambium – Seller Central</label>
                <input type="file" name="vi_file" accept=".xlsx,.xls" />
            </div>
            <div>
                <label class="field-label">Vendor Central</label>
                <input type="file" name="vc_file" accept=".xlsx,.xls" />
            </div>
        </div>

        <div style="background:rgba(232,75,75,0.08);border:1px solid rgba(232,75,75,0.3);border-radius:10px;padding:14px 16px;margin-bottom:18px;">
            <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;">
                <input type="checkbox" name="replace_day" value="1" />
                <span style="font-size:13px;font-weight:600;color:var(--danger);">Replace existing data for this date &amp; account</span>
            </label>
            <p style="font-size:12px;color:var(--danger);margin-top:6px;opacity:0.85;">
                ⚠ This will DELETE all existing sales records for the selected date and uploaded accounts before saving new data. Use only to correct a wrong upload.
            </p>
        </div>

        <button type="submit" class="btn-p">🔄 Log Sales</button>

    </form>
</div>
